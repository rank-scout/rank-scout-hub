providers = ["node"]

[variables]
NIXPACKS_NODE_VERSION = "22"
NODE_ENV = "production"

[phases.setup]
nixPkgs = ["nodejs_22", "nginx", "gettext"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "set -eu; export OLLAMA_AUTH_KEY=\"${OLLAMA_AUTH_KEY:-__DISABLED__}\"; envsubst '${OLLAMA_AUTH_KEY}' < /app/nginx.conf > /app/nginx.runtime.conf && exec nginx -c /app/nginx.runtime.conf -g 'daemon off;'"