providers = ["node"]

[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
nixPkgs = ["nodejs_22", "nginx", "gettext"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "set -eu; test -n \"$OLLAMA_AUTH_KEY\"; envsubst '${OLLAMA_AUTH_KEY}' < nginx.conf > /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'"