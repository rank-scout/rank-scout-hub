# KYRA FIX: 410-Blocker für alte Dating/Casino Subdomains
server {
    listen 80;
    server_name casino.rank-scout.com adult.rank-scout.com dating.rank-scout.com;
    
    # Sagt Google: Die Seite wurde dauerhaft und absichtlich gelöscht
    return 410;
}
server {
    listen 80;
    server_name localhost;

    location / {
        root /app/dist;
        index index.html index.htm;
        # Das SPA-Routing-Gesetz:
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /app/dist;
    }
}