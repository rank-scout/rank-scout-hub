server {
    listen 80;
    server_name _;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Kill-Switch für das alte Chef-Cockpit
    location = /chef-cockpit.html {
        return 410;
    }

    # SEO Automatisierung: Rewrite für die dynamische Sitemap
    location = /sitemap.xml {
        # Zwingt Nginx, die Anfrage direkt an Supabase weiterzuleiten, 
        # OHNE dass React davon etwas mitbekommt.
        rewrite ^/sitemap.xml$ https://oeshjjvhtmebjwbouayc.supabase.co/storage/v1/object/public/seo-assets/sitemap.xml permanent;
    }
        
        # Caching-Header für Google
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        root /app/dist;
        index index.html index.htm;

        # SPA-Routing
        try_files $uri $uri/ /index.html;
    }

    # Geschützter Tunnel zu Ollama
    location /ollama/ {
        if ($http_authorization != "Bearer ${OLLAMA_AUTH_KEY}") {
            return 401;
        }

        proxy_pass http://akc00w4cg4c04wgksswgwog4-191703867441:11434/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_buffering off;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /app/dist;
    }
}