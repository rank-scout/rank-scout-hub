# 1. Die 410-Betonwand ist jetzt das absolute Standard-Fangnetz (default_server)
server {
    listen 80 default_server;
    
    # Der Unterstrich "_" greift alles ab, was nicht im unteren Block exakt matcht
    server_name casino.rank-scout.com adult.rank-scout.com dating.rank-scout.com _;
    
    return 410;
}

# 2. Die Hauptdomain lädt NUR, wenn der Name exakt stimmt
server {
    listen 80;
    server_name rank-scout.com www.rank-scout.com;

    location / {
        root /app/dist;
        index index.html index.htm;
        
        # Das SPA-Routing-Gesetz:
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /app/dist;
    }
}