server {
    listen 80;
    server_name localhost;

    location / {
        root /app/dist;
        index index.html index.htm;
        # Das SPA-Routing-Gesetz:
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /app/dist;
    }
}