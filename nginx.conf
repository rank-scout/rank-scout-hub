# Das Standard-Routing für unsere Hauptdomain
server {
    listen 80 default_server;
    server_name _;

    location / {
        root /app/dist;
        index index.html index.htm;
        # Das SPA-Routing-Gesetz:
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /app/dist;
    }
}