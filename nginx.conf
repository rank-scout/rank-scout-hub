server {
    listen 80;
    server_name _;

    location / {
        root /app/dist;
        index index.html index.htm;
        
        # Das SPA-Routing-Gesetz:
        # Sichert Direktlinks und Browser-Refreshes ab.
        try_files $uri $uri/ /index.html;
    }

    # Der geschützte Tunnel zu unserer lokalen KI (Ollama)
    location /ollama/ {
        # Unser Türsteher-Gesetz: Kein Zugriff ohne validen Key.
        if ($http_authorization != "Bearer 4382Rank1Scout-Secret-Key-2026") {
            return 401; 
        }

        # Weiterleitung an den spezifischen Ollama-Container
        proxy_pass http://akc00w4cg4c04wgksswgwog4-191703867441:11434/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # CPU-Inference-Gesetz: Wir geben der Hardware Zeit zum Rechnen.
        # 10 Minuten Timeout für Content-Tiefe (4.000+ Wörter).
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        
        # Verhindert Buffering, damit die Verbindung stabil bleibt
        proxy_buffering off;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /app/dist;
    }
}