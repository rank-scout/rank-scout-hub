worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    server {
        listen 80 default_server;
        server_name _;
        root /app/dist;
        index index.html index.htm;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Kill-Switch für das alte Chef-Cockpit
        location = /chef-cockpit.html {
            return 410;
        }

        # Saubere Normalisierung
        location = /sitemap.xml/ {
            return 301 /sitemap.xml;
        }

        # /sitemap.xml darf NIEMALS in die SPA fallen
        location = /sitemap.xml {
            add_header Cache-Control "public, max-age=3600" always;
            return 301 https://oeshjjvhtmebjwbouayc.supabase.co/storage/v1/object/public/seo-assets/sitemap.xml;
        }

        # Alle Datei-Anfragen strikt vom SPA-Fallback trennen
        location ~* \.(?:xml|txt|ico|webmanifest|json|map|png|jpe?g|gif|webp|svg|css|js|woff2?)$ {
            try_files $uri =404;
            access_log off;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Geschützter Tunnel zu Ollama
        location /ollama/ {
            if ($http_authorization != "Bearer ${OLLAMA_AUTH_KEY}") {
                return 401;
            }

            proxy_pass http://akc00w4cg4c04wgksswgwog4-191703867441:11434/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 600s;
            proxy_connect_timeout 600s;
            proxy_buffering off;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            try_files /50x.html =500;
        }
    }
}