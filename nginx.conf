server {
    listen 80 default_server;
    server_name _; # Fängt absolut alle Anfragen an diesen Container ab

    # KYRA FIX: Proxy-sichere 410-Wand direkt im Hauptblock
    if ($host ~* "^(casino|adult|dating)\.rank-scout\.com$") {
        return 410;
    }
    if ($http_x_forwarded_host ~* "^(casino|adult|dating)\.rank-scout\.com$") {
        return 410;
    }

    # Normales SPA-Routing für die Hauptdomain
    location / {
        root /app/dist;
        index index.html index.htm;
        # Das SPA-Routing-Gesetz:
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /app/dist;
    }
}