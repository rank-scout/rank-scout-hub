server {
    listen 80;
    # Wir setzen hier die echten Domains ein, damit Nginx weiß, wann er die App zeigen darf
    server_name rank-scout.com www.rank-scout.com localhost;

    location / {
        root /app/dist;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /app/dist;
    }
}